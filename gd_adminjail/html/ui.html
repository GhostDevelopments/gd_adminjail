<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Force absolute transparency on the NUI container */
        html, body { 
            background: transparent !important;
            background-color: rgba(0, 0, 0, 0) !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* The "greyed part" - the actual UI panel */
        .ui-panel { 
            background-color: #121212;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 600px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }
    </style>
</head>
<body class="opacity-0 transition-opacity duration-300 pointer-events-none">
    <div class="ui-panel overflow-hidden">
        <div class="px-8 py-6 border-b border-white/10 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-800 text-white tracking-tight">ADMIN JAIL</h1>
                <p class="text-white/40 text-xs uppercase tracking-widest font-600">Active Sentences</p>
            </div>
            <button onclick="closeUI()" class="text-white/20 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="p-6 max-h-[400px] overflow-y-auto" id="playerList">
            <!-- Players injected here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
